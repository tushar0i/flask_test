{%extends 'base.html' %}

{%block title%}File-upload-myapp{%endblock%}
{%block content%}
<div>
    <h2>File Upload</h2>
    <h3> </h3>
    <form method="POST" action="{{ url_for('fileupload')}}" enctype="multipart/form-data">
        <input type="file" name="file" title="select file" accept="application/pdf">
        <input type="submit" value="Upload">
    </form>
</div>
{%endblock%}
