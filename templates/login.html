{% extends 'base.html'%}
{%block title%}Login-myapp{%endblock%}

{%block content%} 
<div>
    <h2>LOGIN</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <input type="text" name="email" placeholder="Email"> 
        <br>
        <input type="password" name="password" placeholder="Password">
        <br>
        <input type="submit" value="Login">
    </form>
</div>
{%endblock%}
